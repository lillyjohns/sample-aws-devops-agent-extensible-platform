name: propose-fix-pr
description: Open a GitHub PR applying a deterministic, runbook-approved IaC fix (write-as-proposal, human merge gate)
type: lambda
enabled: true
owner: platform-team
handler: lambda/handler.py
# The write-as-proposal exception: the AWS environment stays read-only
# (readOnly: true below), but this tool performs ONE declared external write —
# opening a GitHub pull request. The PR is the human-in-the-loop gate: nothing
# is applied until a human reviews and merges. The GitHub token is a
# fine-grained PAT scoped to a single repo, resolved at runtime from an SSM
# SecureString (never in the template, never in git).
externalWrite:
  system: github
  action: open-pull-request
  gate: human-review
  credential:
    ssmParameter: /governance-blueprint/github-token
    envVar: GITHUB_TOKEN_PARAM
retirement: >
  Retire when AWS DevOps Agent gains native PR-creation for cost findings —
  this tool exists only to close the propose-fix loop until then. Set
  enabled: false and cdk deploy; the target and the Agent Space allowlist
  entry disappear together.
tools:
  - name: propose_fix_pr
    description: >
      Open a GitHub pull request applying an approved, deterministic IaC fix for
      a cost finding. The change is generated by a fixed transform selected via
      change_description (e.g. ebs-gp2-to-gp3) — never free-form edits. Use only
      after search_runbook confirms the procedure and the runbook names this
      change_description. Set dry_run=true to preview the diff without opening a
      PR. The PR is a proposal: a human reviews and merges it.
    inputSchema:
      type: object
      properties:
        repo:
          type: string
          description: "GitHub repository as owner/name. Default: the blueprint repo (lillyjohns/sample-aws-devops-agent-governance-blueprint)."
        file_path:
          type: string
          description: "Path of the IaC file to fix within the repo, e.g. scenarios/demo-workload/template.yaml"
        change_description:
          type: string
          description: "Which approved transform to apply."
          enum: [ebs-gp2-to-gp3]
        finding:
          type: object
          description: "The cost finding driving this fix (from find_cost_waste) — included in the PR body for reviewer context."
        dry_run:
          type: boolean
          description: "If true, return the unified diff that WOULD be proposed without touching GitHub (default false)."
      required: [file_path, change_description]
permissions: []
readOnly: true
